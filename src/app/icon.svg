<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Green-to-yellow swoosh gradient -->
    <linearGradient id="swoosh" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="35%" stop-color="#4ADE80"/>
      <stop offset="70%" stop-color="#BEF264"/>
      <stop offset="100%" stop-color="#FACC15"/>
    </linearGradient>
    <!-- Bright edge highlight -->
    <linearGradient id="swooshEdge" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <!-- Starburst glow -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#FACC15" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FACC15" stop-opacity="0"/>
    </radialGradient>
    <!-- Background radial -->
    <radialGradient id="bgGrad" cx="40%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#0F1A24"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <!-- Ambient glow behind V -->
    <radialGradient id="vGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#4ADE80" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background squircle -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="270" rx="230" ry="210" fill="url(#vGlow)"/>

  <!-- === SWOOSH — behind the V on the left side === -->
  <!-- Lower-left portion of the orbital swoosh (passes behind V) -->
  <path d="
    M 60,360
    C 80,310  120,260  180,230
    C 240,200  290,215  280,260
    C 270,305  200,310  210,265
    C 220,220  270,195  330,180
    L 310,195
    C 260,210  235,235  240,265
    C 245,295  300,295  310,255
    C 320,215  275,195  215,218
    C 155,240  100,290  70,360
    Z
  " fill="url(#swoosh)" opacity="0.9"/>

  <!-- === BOLD WHITE V — center stage === -->
  <text
    x="248"
    y="395"
    font-family="Arial Black, Impact, Helvetica, sans-serif"
    font-weight="900"
    font-size="380"
    fill="white"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-8"
  >V</text>

  <!-- === SWOOSH — in front of V, wrapping from lower-right up to starburst === -->
  <path d="
    M 220,380
    C 260,350  310,300  340,260
    C 370,220  395,175  415,130
    C 430,100  440,75  435,55
    L 455,40
    C 465,65  455,100  440,135
    C 420,180  395,225  365,262
    C 335,300  290,340  250,368
    Z
  " fill="url(#swoosh)" opacity="0.92"/>

  <!-- Bright inner edge on front swoosh -->
  <path d="
    M 235,372
    C 275,342  325,290  355,248
    C 385,206  410,160  435,110
    C 445,88  452,65  448,48
  " fill="none" stroke="url(#swooshEdge)" stroke-width="6" stroke-linecap="round" opacity="0.45"/>

  <!-- === STARBURST at top-right === -->
  <g transform="translate(448,42)">
    <!-- Glow aura -->
    <circle cx="0" cy="0" r="50" fill="url(#starGlow)"/>
    <!-- 8-point star -->
    <polygon points="
      0,-30  5,-9  26,-18  11,-2  30,0  11,2  26,18  5,9
      0,30  -5,9  -26,18  -11,2  -30,0  -11,-2  -26,-18  -5,-9
    " fill="#FACC15" opacity="0.95"/>
    <!-- Inner bright points -->
    <polygon points="
      0,-15  3,-5  13,-9  6,-1.5  15,0  6,1.5  13,9  3,5
      0,15  -3,5  -13,9  -6,1.5  -15,0  -6,-1.5  -13,-9  -3,-5
    " fill="#FEF9C3"/>
    <!-- Hot center -->
    <circle cx="0" cy="0" r="4.5" fill="#FFFDE7"/>
  </g>
</svg>
